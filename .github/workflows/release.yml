name: Build and Release Android APK

on:
    push:
        branches:
            - release

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm install

            - name: Create .env file
              run: |
                  printf '%s' "$ENV_FILE" > .env
                  printf '%s' "EXPO_PUBLIC_VERSION=1.0.$BUILD_NUMBER" >> .env
              env:
                  ENV_FILE: ${{ secrets.ENV_FILE }}
                  BUILD_NUMBER: ${{ github.run_number }}

            - name: Create google-services.json
              run: printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
              env:
                  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

            - name: Create Keystore
              run: |
                  echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: "zulu"
                  java-version: "17"

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3

            - name: Sync Assets
              run: |
                  npm run assets

            - name: Build Release APK
              run: |
                  npx dotenv -e .env -- bash -c "cd android && ./gradlew assembleRelease && cd .."
              env:
                  KEYSTORE_FILE: release.keystore
                  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
                  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

            - name: Upload APK to GitHub Releases
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v1.0.${{ github.run_number }}
                  name: MinMobile Release v1.0.${{ github.run_number }}
                  body: "This is an automated build from the release branch."
                  files: android/app/build/outputs/apk/release/app-*-release.apk
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
